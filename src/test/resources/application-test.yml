spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: none

app:
  base-url: http://localhost:8080
  short-code-length: 7
  default-ttl-days: 365
  rate-limit:
    max-requests: 1000
    window-minutes: 1

logging:
  level:
    root: WARN
    com.urlshortener: DEBUG
