<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #020818;
      color: #e2e8f0;
      overflow-x: hidden;
      min-height: 100vh;
    }

    canvas#bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      text-shadow: none;
    }

    header p {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: #94a3b8;
    }

    .card {
      width: 100%;
      max-width: 600px;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 0 80px rgba(56, 189, 248, 0.08);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
    }

    input[type="url"],
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 0.85rem 1.1rem;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 0.75rem;
      color: #e2e8f0;
      font-size: 0.97rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    input::placeholder { color: #475569; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    button#shortenBtn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
    }

    button#shortenBtn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
    }

    button#shortenBtn:active { transform: translateY(0); }
    button#shortenBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result {
      display: none;
      margin-top: 1.75rem;
      padding: 1.25rem 1.5rem;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 1rem;
      animation: fadeIn 0.35s ease;
    }

    .result.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #10b981;
      margin-bottom: 0.6rem;
    }

    .result.error .result-label { color: #ef4444; }

    .result-url-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .result-url {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 600;
      color: #38bdf8;
      text-decoration: none;
      word-break: break-all;
    }

    .result-url:hover { text-decoration: underline; }

    button.copy-btn {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      background: rgba(56, 189, 248, 0.15);
      border: 1px solid rgba(56, 189, 248, 0.35);
      border-radius: 0.5rem;
      color: #38bdf8;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.copy-btn:hover { background: rgba(56, 189, 248, 0.28); }

    .meta {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #64748b;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .meta span { display: flex; align-items: center; gap: 0.3rem; }

    .history {
      width: 100%;
      max-width: 600px;
      margin-top: 2rem;
    }

    .history h3 {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 0.75rem;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.3s ease;
    }

    .history-item .short {
      font-weight: 700;
      color: #818cf8;
      font-size: 0.95rem;
      min-width: 80px;
      text-decoration: none;
    }

    .history-item .short:hover { text-decoration: underline; }

    .history-item .original {
      flex: 1;
      font-size: 0.82rem;
      color: #64748b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: #334155;
    }

    footer a { color: #4f46e5; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="overlay">
  <header>
    <h1>URL Shortener</h1>
    <p>Shorten any link. Fast, free, and beautifully simple.</p>
  </header>

  <div class="card">
    <div class="input-group">
      <label>Long URL</label>
      <input type="url" id="urlInput" placeholder="https://very-long-url.com/page?with=params" />
    </div>

    <div class="row">
      <div class="input-group">
        <label>Custom Alias <span style="color:#4b5563;font-weight:400">(optional)</span></label>
        <input type="text" id="aliasInput" placeholder="my-link" maxlength="20" />
      </div>
      <div class="input-group">
        <label>Expires in (days)</label>
        <input type="number" id="ttlInput" placeholder="365" min="1" max="365" value="365" />
      </div>
    </div>

    <button id="shortenBtn" onclick="shorten()">Shorten URL</button>

    <div class="result" id="result">
      <div class="result-label" id="resultLabel">Short URL ready</div>
      <div class="result-url-row">
        <a class="result-url" id="resultUrl" href="#" target="_blank"></a>
        <button class="copy-btn" onclick="copy()">Copy</button>
      </div>
      <div class="meta" id="resultMeta"></div>
    </div>
  </div>

  <div class="history" id="historySection" style="display:none">
    <h3>Recent links</h3>
    <div id="historyList"></div>
  </div>
</div>

<footer>
  <a href="/swagger-ui.html" target="_blank">API Docs</a> &nbsp;·&nbsp;
  <a href="/actuator/health" target="_blank">Health</a>
</footer>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── Three.js underwater fish scene ────────────────────────────────────────
(function () {
  const canvas = document.getElementById('bg');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020818, 0.035);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 0, 30);

  // Ambient + point lights
  scene.add(new THREE.AmbientLight(0x0a1628, 2));
  const light1 = new THREE.PointLight(0x38bdf8, 3, 80);
  light1.position.set(10, 10, 20);
  scene.add(light1);
  const light2 = new THREE.PointLight(0x818cf8, 2, 60);
  light2.position.set(-15, -8, 15);
  scene.add(light2);

  // ── Boid/Fish class ────────────────────────────────────────────────────
  const FISH_COUNT = 120;
  const BOUNDS = 40;

  function makeFishMesh() {
    const group = new THREE.Group();

    // Body — scaled sphere
    const bodyGeo = new THREE.SphereGeometry(0.45, 8, 6);
    bodyGeo.scale(1.8, 0.6, 0.5);
    const bodyMat = new THREE.MeshPhongMaterial({
      color: new THREE.Color().setHSL(Math.random() * 0.15 + 0.55, 0.9, 0.6),
      emissive: new THREE.Color().setHSL(Math.random() * 0.15 + 0.55, 0.7, 0.15),
      shininess: 100,
      transparent: true,
      opacity: 0.88,
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    group.add(body);

    // Tail — cone
    const tailGeo = new THREE.ConeGeometry(0.35, 0.7, 5);
    tailGeo.rotateZ(Math.PI / 2);
    const tail = new THREE.Mesh(tailGeo, bodyMat);
    tail.position.x = -0.85;
    group.add(tail);

    return group;
  }

  const fishes = [];
  for (let i = 0; i < FISH_COUNT; i++) {
    const mesh = makeFishMesh();
    const pos = new THREE.Vector3(
      (Math.random() - 0.5) * BOUNDS * 2,
      (Math.random() - 0.5) * BOUNDS,
      (Math.random() - 0.5) * BOUNDS,
    );
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.06,
      (Math.random() - 0.5) * 0.03,
      (Math.random() - 0.5) * 0.06,
    );
    mesh.position.copy(pos);
    scene.add(mesh);
    fishes.push({ mesh, vel, phase: Math.random() * Math.PI * 2 });
  }

  // ── Floating bubbles ──────────────────────────────────────────────────
  const bubbleGeo = new THREE.SphereGeometry(1, 6, 6);
  const bubbleMat = new THREE.MeshPhongMaterial({
    color: 0x38bdf8,
    transparent: true,
    opacity: 0.08,
    wireframe: true,
  });
  const bubbles = [];
  for (let i = 0; i < 60; i++) {
    const b = new THREE.Mesh(bubbleGeo, bubbleMat);
    const s = Math.random() * 0.3 + 0.05;
    b.scale.setScalar(s);
    b.position.set(
      (Math.random() - 0.5) * BOUNDS * 2,
      (Math.random() - 0.5) * BOUNDS,
      (Math.random() - 0.5) * BOUNDS,
    );
    scene.add(b);
    bubbles.push({ mesh: b, speed: Math.random() * 0.04 + 0.01 });
  }

  // ── Particle dust ────────────────────────────────────────────────────
  const dustGeo = new THREE.BufferGeometry();
  const dustCount = 800;
  const positions = new Float32Array(dustCount * 3);
  for (let i = 0; i < dustCount * 3; i++) positions[i] = (Math.random() - 0.5) * BOUNDS * 2.5;
  dustGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const dustMat = new THREE.PointsMaterial({ color: 0x38bdf8, size: 0.06, transparent: true, opacity: 0.4 });
  scene.add(new THREE.Points(dustGeo, dustMat));

  // ── Boid steering helpers ────────────────────────────────────────────
  const _v = new THREE.Vector3();
  function steer(fish, others) {
    const sep = new THREE.Vector3();
    const ali = new THREE.Vector3();
    const coh = new THREE.Vector3();
    let sepN = 0, aliN = 0, cohN = 0;

    for (const other of others) {
      if (other === fish) continue;
      const d = fish.mesh.position.distanceTo(other.mesh.position);
      if (d < 3) {
        _v.copy(fish.mesh.position).sub(other.mesh.position).divideScalar(d * d);
        sep.add(_v); sepN++;
      }
      if (d < 6) { ali.add(other.vel); aliN++; }
      if (d < 8) { coh.add(other.mesh.position); cohN++; }
    }

    if (sepN) sep.divideScalar(sepN).normalize().multiplyScalar(0.003);
    if (aliN) ali.divideScalar(aliN).normalize().multiplyScalar(0.001);
    if (cohN) {
      coh.divideScalar(cohN).sub(fish.mesh.position).normalize().multiplyScalar(0.0005);
    }

    fish.vel.add(sep).add(ali).add(coh);

    // Bounds wrap
    const B = BOUNDS;
    if (fish.mesh.position.x >  B) fish.mesh.position.x = -B;
    if (fish.mesh.position.x < -B) fish.mesh.position.x =  B;
    if (fish.mesh.position.y >  B * 0.6) fish.mesh.position.y = -B * 0.6;
    if (fish.mesh.position.y < -B * 0.6) fish.mesh.position.y =  B * 0.6;
    if (fish.mesh.position.z >  B) fish.mesh.position.z = -B;
    if (fish.mesh.position.z < -B) fish.mesh.position.z =  B;

    // Speed clamp
    const speed = fish.vel.length();
    if (speed > 0.12) fish.vel.multiplyScalar(0.12 / speed);
    if (speed < 0.02) fish.vel.multiplyScalar(0.02 / speed);
  }

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.012;

    // Animate fish
    for (const fish of fishes) {
      steer(fish, fishes);
      fish.mesh.position.add(fish.vel);

      // Face direction of travel
      if (fish.vel.length() > 0.001) {
        const target = fish.mesh.position.clone().add(fish.vel);
        fish.mesh.lookAt(target);
      }

      // Tail wag
      const tail = fish.mesh.children[1];
      if (tail) tail.rotation.y = Math.sin(t * 6 + fish.phase) * 0.4;
    }

    // Rise bubbles
    for (const b of bubbles) {
      b.mesh.position.y += b.speed;
      if (b.mesh.position.y > BOUNDS * 0.6) b.mesh.position.y = -BOUNDS * 0.6;
      b.mesh.rotation.x += 0.005;
      b.mesh.rotation.y += 0.008;
    }

    // Slow camera drift
    camera.position.x = Math.sin(t * 0.05) * 5;
    camera.position.y = Math.cos(t * 0.04) * 3;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// ─── URL Shortener logic ────────────────────────────────────────────────────
const history = [];

async function shorten() {
  const url    = document.getElementById('urlInput').value.trim();
  const alias  = document.getElementById('aliasInput').value.trim();
  const ttl    = parseInt(document.getElementById('ttlInput').value) || 365;
  const btn    = document.getElementById('shortenBtn');
  const result = document.getElementById('result');

  if (!url) { showError('Please enter a URL.'); return; }

  btn.disabled = true;
  btn.textContent = 'Shortening…';
  result.style.display = 'none';

  const body = { url, ttlDays: ttl };
  if (alias) body.customAlias = alias;

  try {
    const res = await fetch('/api/v1/urls', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.message || 'Something went wrong.');
      return;
    }

    showSuccess(data);
    addHistory(data);
    document.getElementById('urlInput').value = '';
    document.getElementById('aliasInput').value = '';

  } catch (e) {
    showError('Could not reach the server. Is Docker running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Shorten URL';
  }
}

function showSuccess(data) {
  const result = document.getElementById('result');
  result.className = 'result';
  result.style.display = 'block';
  document.getElementById('resultLabel').textContent = '✅ Short URL ready';
  const link = document.getElementById('resultUrl');
  link.href = data.shortUrl;
  link.textContent = data.shortUrl;
  link.target = '_blank';

  const expires = data.expiresAt
    ? new Date(data.expiresAt).toLocaleDateString()
    : 'Never';
  document.getElementById('resultMeta').innerHTML =
    `<span>📋 Code: <b style="color:#c084fc">${data.shortCode}</b></span>
     <span>⏳ Expires: ${expires}</span>`;
}

function showError(msg) {
  const result = document.getElementById('result');
  result.className = 'result error';
  result.style.display = 'block';
  document.getElementById('resultLabel').textContent = '❌ Error';
  document.getElementById('resultUrl').textContent = msg;
  document.getElementById('resultUrl').href = '#';
  document.getElementById('resultMeta').innerHTML = '';
}

function copy() {
  const url = document.getElementById('resultUrl').textContent;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1800);
  });
}

function addHistory(data) {
  history.unshift(data);
  if (history.length > 5) history.pop();

  const section = document.getElementById('historySection');
  const list    = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <a class="short" href="${h.shortUrl}" target="_blank">${h.shortUrl.replace(location.origin,'')}</a>
      <span class="original" title="${h.originalUrl}">${h.originalUrl}</span>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${h.shortUrl}')">Copy</button>
    </div>
  `).join('');
}

// Enter key submits
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') shorten();
});
</script>
</body>
</html>
